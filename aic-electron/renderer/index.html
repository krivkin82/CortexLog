<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIC MVP</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  </head>
  <body>
    <header class="app-header app-header-narrow">
      <h1>AIC MVP</h1>
      <div class="header-right">
        <button type="button" id="btn-journal" class="panel-toggle">Journal</button>
        <button type="button" id="btn-chat" class="panel-toggle">Chat</button>
        <button type="button" id="btn-knowledge-map" class="panel-toggle">Knowledge Map</button>
        <button type="button" id="btn-proposed-insights" class="panel-toggle">Proposed Insights</button>
        <span class="status">
          Backend: <span id="backend-status">checking...</span>
          &nbsp;|&nbsp;
          <span id="llm-status-wrap" title="">LLM: <span id="llm-status">checking...</span></span>
        </span>
      </div>
    </header>
    <div id="session-nudge" class="session-nudge hidden">
      You've been here a while. Consider taking a short break or doing something offline.
    </div>

    <main class="app-main app-main-overhaul" id="app-main">
      <div id="content-area" class="content-area">
        <div id="empty-state" class="empty-state">
          <span class="watercolor-text">AIC MVP</span>
        </div>
        <section class="card pane-content pane-journal" id="pane-journal">
          <div class="pane-header">
            <h2>Journal</h2>
            <button type="button" class="pane-close" id="close-journal" title="Close">&#10005;</button>
          </div>
          <div id="journal-feed" class="scroll-list journal-feed"></div>
          <div class="journal-input-strip">
            <button id="journal-save">Save Entry</button>
            <div class="textarea-auto-wrap">
              <textarea id="journal-input" placeholder="Write a journal entry..."></textarea>
            </div>
          </div>
        </section>
        <div class="splitter splitter-content" id="splitter-content"></div>
        <section class="card pane-content pane-chat" id="pane-chat">
          <div class="pane-header">
            <h2>Chat</h2>
            <button type="button" class="pane-close" id="close-chat" title="Close">&#10005;</button>
          </div>
          <div id="chat-log" class="chat-log"></div>
          <div id="chat-citations" class="chat-citations"></div>
          <div class="chat-input-strip">
            <button id="chat-send">Send</button>
            <div class="textarea-auto-wrap">
              <textarea id="chat-input" placeholder="Say something..."></textarea>
            </div>
          </div>
        </section>
      </div>
      <div class="splitter splitter-col splitter-km" id="splitter-km"></div>
      <div class="resize-col col-knowledge" id="col-mid">
        <section class="card pane-content" id="pane-knowledge">
          <h2>Knowledge Map</h2>
          <div class="knowledge-actions">
            <button id="refresh-knowledge">Refresh</button>
          </div>
          <div class="knowledge-section">
            <h3>Entities</h3>
            <div id="entities-list" class="scroll-list"></div>
          </div>
          <div class="knowledge-section">
            <h3>Relations</h3>
            <div id="relations-list" class="scroll-list"></div>
          </div>
          <div class="knowledge-section">
            <h3>Conflicts</h3>
            <div id="conflicts-list" class="scroll-list"></div>
          </div>
          <div class="knowledge-section">
            <h3>Selected</h3>
            <div id="knowledge-detail">Select an entity to view details.</div>
          </div>
        </section>
      </div>
      <div class="splitter splitter-col splitter-pi" id="splitter-pi"></div>
      <div class="resize-col col-insights" id="col-right">
        <section class="card pane-content" id="pane-insights">
          <h2>Proposed Insights</h2>
          <div class="insight-toolbar">
            <button id="open-filtered">Filtered</button>
            <span id="filtered-count" class="filtered-count"></span>
          </div>
          <div id="insights-list" class="insights-list scroll-list"></div>
        </section>
      </div>
    </main>

    <script src="./crypto-utils.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
